services:
  app:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --help

  api:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  full-test:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_MODE: ${FULL_TEST_MODE:-coverage}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test

  full-test-original:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test --full-test-mode original

  full-test-coverage:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test --full-test-mode coverage

  run_experiment:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      COVERAGE_TARGET_SIZE: ${COVERAGE_TARGET_SIZE:-100}
      COVERAGE_SEED: ${COVERAGE_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: >
      sh -c "python -m src.training.train_xgboost &&
      python -m src.data.coverage --input data/processed/test.csv --output artifacts/coverage_test_set.csv --summary-output artifacts/coverage_summary.json --target-size ${COVERAGE_TARGET_SIZE} --seed ${COVERAGE_SEED} &&
      python -m src.pipeline.run_experiment --mode adaptive_full_framework --evaluation-set coverage"

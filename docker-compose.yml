services:
  app:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --help

  api:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  full-test:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_MODE: ${FULL_TEST_MODE:-unbiased}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test

  full-test-original:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test --full-test-mode original

  full-test-coverage:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FULL_TEST_MAX_ROWS: ${FULL_TEST_MAX_ROWS:-all}
      FULL_TEST_SEED: ${FULL_TEST_SEED:-42}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.main --full-test --full-test-mode unbiased

  run_experiment:
    build: .
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e2b}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
    command: python -m src.pipeline.run_experiment --mode adaptive_hierarchical --config configs/adaptive_hierarchical.yaml --evaluation-set unbiased --report --calibrate
